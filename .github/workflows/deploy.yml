name: Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.prismglobalservicesltd.com
          username: priseghy
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /home/priseghy/public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/SETUP.md
            **/*.zip
