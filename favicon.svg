<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="#090c14"/>
  <!-- Prism glow aura -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="38%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00ffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="prismGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#c800ff"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6600cc" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <ellipse cx="50" cy="44" rx="30" ry="22" fill="url(#glow)"/>
  <!-- Prism triangle body (filled face) -->
  <polygon points="50,14 76,64 24,64" fill="url(#faceGrad)"/>
  <!-- Prism outline (gradient stroke) -->
  <polygon points="50,14 76,64 24,64" fill="none" stroke="url(#prismGrad)" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Inner refraction lines -->
  <line x1="50" y1="14" x2="50" y2="64" stroke="url(#prismGrad)" stroke-width="0.9" opacity="0.6"/>
  <!-- Refracted light ray bottom-left -->
  <line x1="24" y1="64" x2="15" y2="78" stroke="#00e5ff" stroke-width="1.4" opacity="0.7" stroke-linecap="round"/>
  <!-- Refracted light ray bottom-right -->
  <line x1="76" y1="64" x2="85" y2="78" stroke="#c800ff" stroke-width="1.4" opacity="0.7" stroke-linecap="round"/>
  <!-- Horizontal spectrum band -->
  <line x1="20" y1="72" x2="80" y2="72" stroke="url(#prismGrad)" stroke-width="0.8" opacity="0.4"/>
  <!-- PG text -->
  <text x="50" y="90" font-family="'Arial', sans-serif" font-size="10" font-weight="700"
        text-anchor="middle" letter-spacing="2" fill="#ffffff" opacity="0.85">PG</text>
</svg>
